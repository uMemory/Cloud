<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="er-arr" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" overflow="visible">
      <polygon points="0 0,10 3.5,0 7" fill="#6b7280"/>
    </marker>
    <marker id="er-dash-arr" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" overflow="visible">
      <polygon points="0 0,10 3.5,0 7" fill="#64748b"/>
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">图 3 · 数据库 ER 图</text>

  <rect x="40" y="60" width="210" height="150" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
  <text x="145" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">users 用户表</text>
  <text x="58" y="108" fill="#1e40af">id：主键 PK</text>
  <text x="58" y="128" fill="#1e40af">username：登录账号</text>
  <text x="58" y="148" fill="#1e40af">password_hash：密码哈希</text>
  <text x="58" y="168" fill="#1e40af">email：邮箱</text>
  <text x="58" y="188" fill="#1e40af">last_login：最后登录时间</text>

  <rect x="340" y="60" width="240" height="190" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
  <text x="460" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">servers 服务器表</text>
  <text x="360" y="108" fill="#15803d">id：主键 PK</text>
  <text x="360" y="128" fill="#15803d">server_key：Agent 唯一标识</text>
  <text x="360" y="148" fill="#15803d">hostname：主机名</text>
  <text x="360" y="168" fill="#15803d">ip_address：内网 IP</text>
  <text x="360" y="188" fill="#15803d">status：在线状态</text>
  <text x="360" y="208" fill="#15803d">risk_level：服务器风险等级</text>
  <text x="360" y="228" fill="#15803d">last_seen：最后上报时间</text>

  <rect x="700" y="60" width="220" height="190" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.4"/>
  <text x="810" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">server_metrics 指标表</text>
  <text x="718" y="108" fill="#78350f">id：主键 PK</text>
  <text x="718" y="128" fill="#78350f">server_id：外键 FK</text>
  <text x="718" y="148" fill="#78350f">cpu_percent：CPU 使用率</text>
  <text x="718" y="168" fill="#78350f">memory_percent：内存使用率</text>
  <text x="718" y="188" fill="#78350f">disk_percent：磁盘使用率</text>
  <text x="718" y="208" fill="#78350f">network / io：吞吐指标</text>
  <text x="718" y="228" fill="#78350f">created_at：采集时间</text>

  <rect x="700" y="330" width="220" height="150" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4"/>
  <text x="810" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">server_alerts 告警表</text>
  <text x="718" y="378" fill="#991b1b">id：主键 PK</text>
  <text x="718" y="398" fill="#991b1b">server_id：外键 FK</text>
  <text x="718" y="418" fill="#991b1b">alert_type：告警类型</text>
  <text x="718" y="438" fill="#991b1b">level：告警等级</text>
  <text x="718" y="458" fill="#991b1b">message / suggestion：内容</text>

  <rect x="40" y="330" width="230" height="170" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.4"/>
  <text x="155" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="#9d174d">ai_instances AI 实例表</text>
  <text x="58" y="378" fill="#9d174d">id：主键 PK</text>
  <text x="58" y="398" fill="#9d174d">instance_sn：实例编号</text>
  <text x="58" y="418" fill="#9d174d">app_name：应用名称</text>
  <text x="58" y="438" fill="#9d174d">cpu/gpu/rdma：资源请求</text>
  <text x="58" y="458" fill="#9d174d">memory/disk：资源请求</text>
  <text x="58" y="478" fill="#9d174d">risk_score：模型风险分</text>

  <rect x="340" y="330" width="240" height="150" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="460" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="#4c1d95">predictions 预测记录表</text>
  <text x="358" y="378" fill="#5b21b6">id：主键 PK</text>
  <text x="358" y="398" fill="#5b21b6">user_id：外键 FK，可为空</text>
  <text x="358" y="418" fill="#5b21b6">input_features：输入特征 JSON</text>
  <text x="358" y="438" fill="#5b21b6">risk_score：预测风险分</text>
  <text x="358" y="458" fill="#5b21b6">risk_level：预测风险等级</text>

  <rect x="40" y="525" width="230" height="58" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.4"/>
  <text x="155" y="548" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">alerts AI 实例告警表</text>
  <text x="58" y="570" fill="#9a3412">instance_id：外键 FK</text>

  <line x1="580" y1="145" x2="698" y2="145" stroke="#6b7280" stroke-width="1.3" marker-end="url(#er-arr)"/>
  <text x="638" y="134" text-anchor="middle" font-size="11" fill="#374151">1 对多</text>
  <line x1="580" y1="202" x2="698" y2="394" stroke="#6b7280" stroke-width="1.3" marker-end="url(#er-arr)"/>
  <text x="630" y="304" font-size="11" fill="#374151">1 对多</text>
  <line x1="250" y1="145" x2="338" y2="388" stroke="#6b7280" stroke-width="1.3" marker-end="url(#er-arr)"/>
  <text x="274" y="270" font-size="11" fill="#374151">1 对多</text>
  <line x1="155" y1="500" x2="155" y2="523" stroke="#6b7280" stroke-width="1.3" marker-end="url(#er-arr)"/>
  <text x="166" y="518" font-size="11" fill="#374151">1 对多</text>
  <path d="M270 414 C300 396, 312 390, 338 390" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#er-dash-arr)"/>
  <text x="307" y="374" text-anchor="middle" font-size="11" fill="#475569">特征来源</text>

  <rect x="310" y="525" width="610" height="58" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="615" y="548" text-anchor="middle" fill="#334155">实线表示数据库外键关系；虚线表示机器学习预测使用的业务特征来源。</text>
  <text x="615" y="570" text-anchor="middle" fill="#334155">监控数据来自服务器 Agent 上报；AI 实例数据来自公开数据集导入和模型分析。</text>
</svg>
