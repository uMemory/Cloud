<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arr-gray" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" overflow="visible"><polygon points="0 0,10 3.5,0 7" fill="#6b7280"/></marker>
    <marker id="arr-blue" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" overflow="visible"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="arr-green" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" overflow="visible"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">图 1 · 系统总体架构</text>

  <rect x="35" y="60" width="830" height="330" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="8,4"/>
  <text x="55" y="84" font-weight="bold" fill="#64748b">Cloud VPC / 内网环境</text>

  <rect x="70" y="130" width="160" height="64" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="154" text-anchor="middle" font-weight="bold" fill="#1e3a8a">浏览器用户</text>
  <text x="150" y="174" text-anchor="middle" font-size="11" fill="#1e40af">公网访问 Dashboard</text>

  <rect x="315" y="90" width="250" height="250" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="440" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">中心监控平台 ECS</text>
  <rect x="345" y="140" width="190" height="44" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="440" y="166" text-anchor="middle" font-weight="bold" fill="#14532d">Nginx + Frontend</text>
  <rect x="345" y="198" width="190" height="44" rx="5" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="440" y="224" text-anchor="middle" font-weight="bold" fill="#4c1d95">Flask API</text>
  <rect x="345" y="256" width="190" height="44" rx="5" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="440" y="282" text-anchor="middle" font-weight="bold" fill="#92400e">MySQL + ML Model</text>

  <rect x="660" y="80" width="150" height="54" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="735" y="102" text-anchor="middle" font-weight="bold" fill="#3730a3">Agent ECS-1</text>
  <text x="735" y="120" text-anchor="middle" font-size="11" fill="#4338ca">collector.py</text>
  <rect x="660" y="175" width="150" height="54" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="735" y="197" text-anchor="middle" font-weight="bold" fill="#3730a3">Agent ECS-2</text>
  <text x="735" y="215" text-anchor="middle" font-size="11" fill="#4338ca">collector.py</text>
  <rect x="660" y="270" width="150" height="54" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="735" y="292" text-anchor="middle" font-weight="bold" fill="#3730a3">Agent ECS-3</text>
  <text x="735" y="310" text-anchor="middle" font-size="11" fill="#4338ca">collector.py</text>

  <line x1="230" y1="162" x2="315" y2="162" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="270" y="150" text-anchor="middle" font-size="11" fill="#1e40af">HTTP :80</text>

  <line x1="660" y1="107" x2="565" y2="205" stroke="#16a34a" stroke-width="1.4" marker-end="url(#arr-green)"/>
  <line x1="660" y1="202" x2="565" y2="220" stroke="#16a34a" stroke-width="1.4" marker-end="url(#arr-green)"/>
  <line x1="660" y1="297" x2="565" y2="235" stroke="#16a34a" stroke-width="1.4" marker-end="url(#arr-green)"/>
  <text x="600" y="185" font-size="11" fill="#15803d">Push metrics</text>
  <text x="600" y="202" font-size="11" fill="#15803d">内网 :8000</text>

  <line x1="440" y1="242" x2="440" y2="255" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arr-gray)"/>
  <line x1="440" y1="184" x2="440" y2="197" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arr-gray)"/>

  <rect x="70" y="350" width="740" height="32" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="92" y="371" font-size="11" fill="#334155">说明：中心平台负责存储、分析、告警和可视化；Agent 节点只负责轻量采集并通过内网 Push 到中心 API。</text>
</svg>
